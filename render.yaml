services:
  - type: web
    name: agrogest-vsm-api
    # Redeploy trigger for compliance scoring release.
    runtime: node
    region: virginia
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @agrogest/api build
    startCommand: node apps/api/dist/scripts/migrate-database.js && node apps/api/dist/main.js
    initialDeployHook: node apps/api/dist/scripts/seed-auth.js
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_TRUST_PROXY
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_HOST
        value: aws-1-us-east-1.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.pdppvazosimktbwiyuus
      - key: DB_PASSWORD
        sync: false
      - key: DB_SCHEMA
        value: public
      - key: DB_SSL
        value: "true"
      # Keep TLS enabled for Supabase pooler connections. For strict certificate
      # verification, load the Supabase CA certificate and set this to "true".
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: LOGIN_RATE_LIMIT_TTL_MS
        value: "60000"
      - key: LOGIN_RATE_LIMIT_MAX
        value: "5"
      - key: LOGIN_RATE_LIMIT_BLOCK_MS
        value: "300000"
      - key: SEED_ADMIN_FIRST_NAME
        value: Admin
      - key: SEED_ADMIN_LAST_NAME
        value: VSM
      - key: SEED_ADMIN_EMAIL
        value: admin@agrogestvsm.local
      - key: SEED_ADMIN_PASSWORD
        sync: false
